name: CD QA - Parches Service

on:
  push:
    branches: [ "develop" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cybersapienseci/parches-service

jobs:
  deploy-qa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:qa-${{ github.sha }},${{ env.IMAGE_NAME }}:qa-latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PARCHES }}

      - name: Deploy to Azure Container Apps (QA)
        run: |
          az containerapp up \
            --name parches-service-qa \
            --resource-group gr-alphaeci-prod \
            --environment gr-alphaeci-prod \
            --image ${{ env.IMAGE_NAME }}:qa-${{ github.sha }} \
            --registry-server ghcr.io \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GITHUB_TOKEN }} \
            --ingress external \
            --target-port 8080

          az containerapp update \
            --name parches-service-qa \
            --resource-group gr-alphaeci-prod \
            --min-replicas 0 \
            --max-replicas 1 \
            --set-env-vars \
              "DB_URL=${{ secrets.DB_URL_QA }}" \
              "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
              "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"

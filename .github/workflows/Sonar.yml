name: Code Quality Analysis (Sonar)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    name: "QA – SonarCloud Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔥 ESTO SOLUCIONA EL ERROR 128 DE RAÍZ EN GITHUB ACTIONS
      - name: Configurar Git Safe Directory
        run: |
          git config --global --add safe.directory '*'

      # Configura el entorno de Java para compilar tu proyecto
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Compila y ejecuta el análisis de Sonar usando Maven (vía propiedades del pom.xml)
      - name: Compilar y Analizar con Sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn clean verify sonar:sonar